<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flori Web Studio | Solutions Digitales Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030305; color: #ffffff; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-primary { background: #4f46e5; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:hover { background: #4338ca; transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4); }
        .input-field { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #4f46e5; background: rgba(255, 255, 255, 0.07); }
        .section-active { display: block; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e1e2d; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;
        const h = React.createElement;

        // --- Helper: Icon Component ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return h('i', { 'data-lucide': name, style: { width: size, height: size }, className });
        };

        // --- Styles partagés ---
        const STYLES = {
            card: "glass p-6 rounded-[24px] transition-all duration-300 hover:bg-white/[0.05] hover:border-indigo-500/30",
            title: "text-3xl md:text-5xl font-black mb-8 uppercase italic tracking-tighter",
            navItem: "cursor-pointer transition-colors hover:text-white font-bold text-[10px] tracking-widest uppercase"
        };

        const App = () => {
            const [page, setPage] = useState('home');
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [testimonials, setTestimonials] = useState([
                { name: "Jean-Marc L.", company: "CEO @ Innovate Plus", quote: "Flori Web Studio a révolutionné notre image de marque.", photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=1" },
                { name: "Sarah M.", company: "GreenEat", quote: "Un design futuriste et une rapidité d'exécution incroyable.", photo: "https://api.dicebear.com/7.x/avataaars/svg?seed=2" }
            ]);

            const navigate = (p) => { setPage(p); window.scrollTo(0, 0); };

            return h('div', { className: 'min-h-screen flex flex-col' },
                // Background Glows
                h('div', { className: 'fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-indigo-600/10 blur-[120px] rounded-full pointer-events-none' }),
                h('div', { className: 'fixed bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-purple-600/10 blur-[120px] rounded-full pointer-events-none' }),

                // Navbar
                h('nav', { className: 'h-20 sticky top-0 z-50 glass flex items-center px-6 md:px-12' },
                    h('div', { className: 'max-w-7xl mx-auto w-full flex justify-between items-center' },
                        h('div', { className: 'flex items-center gap-2 cursor-pointer', onClick: () => navigate('home') },
                            h('div', { className: 'w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center' }, h(Icon, { name: 'cpu', size: 18 })),
                            h('span', { className: 'text-xl font-black uppercase' }, 'FLORI', h('span', { className: 'text-indigo-500' }, 'WEB'))
                        ),
                        h('div', { className: 'hidden md:flex items-center space-x-8' },
                            ['home', 'services', 'portfolio', 'testimonials', 'about'].map(p => 
                                h('span', { 
                                    key: p, 
                                    className: `${STYLES.navItem} ${page === p ? 'text-indigo-500' : 'text-gray-400'}`,
                                    onClick: () => navigate(p)
                                }, p === 'home' ? 'Accueil' : p === 'testimonials' ? 'Témoignages' : p === 'about' ? 'À Propos' : p)
                            ),
                            h('button', { onClick: () => navigate('quote'), className: 'btn-primary text-white px-6 py-2 rounded-full text-[10px] font-bold uppercase' }, 'Devis Gratuit')
                        ),
                        h('div', { className: 'md:hidden' }, h(Icon, { name: 'menu', onClick: () => alert('Menu mobile disponible bientôt') }))
                    )
                ),

                // Content Area
                h('main', { className: 'flex-grow relative z-10 px-6 py-12' },
                    h(AnimatePresence, { mode: 'wait' },
                        page === 'home' && h(Home, { onPortfolio: () => navigate('portfolio'), onContact: () => navigate('quote') }),
                        page === 'services' && h(Services),
                        page === 'portfolio' && h(Portfolio),
                        page === 'testimonials' && h(Testimonials, { list: testimonials, onAdd: (t) => setTestimonials([t, ...testimonials]) }),
                        page === 'about' && h(About),
                        page === 'quote' && h(Quote)
                    )
                ),

                // Floating Chat
                h(ChatBot, { isOpen: isChatOpen, setIsOpen: setIsChatOpen }),

                // Simple Footer
                h('footer', { className: 'py-6 border-t border-white/5 flex flex-col md:row justify-between items-center px-12 gap-4' },
                    h('span', { className: 'text-[10px] text-gray-500 uppercase font-bold' }, '© 2024 Flori Web Studio'),
                    h('div', { className: 'flex gap-2 items-center' },
                        h('div', { className: 'w-2 h-2 bg-green-500 rounded-full animate-pulse' }),
                        h('span', { className: 'text-[9px] text-gray-400 font-mono' }, 'SYSTEM_READY_V2')
                    )
                )
            );
        };

        // --- Sections ---

        const Home = ({ onPortfolio, onContact }) => h(motion.div, { initial: { opacity: 0, y: 10 }, animate: { opacity: 1, y: 0 }, exit: { opacity: 0 }, className: 'max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 pt-10 items-center' },
            h('div', { className: 'space-y-6' },
                h('h1', { className: 'text-5xl md:text-8xl font-black leading-none uppercase' }, 'Dominez ', h('br'), h('span', { className: 'text-indigo-500' }, 'Le Marché.')),
                h('p', { className: 'text-gray-400 text-lg md:text-xl max-w-lg' }, 'Design futuriste et IA pour des performances digitales hors normes.'),
                h('div', { className: 'flex gap-4' },
                    h('button', { onClick: onPortfolio, className: 'btn-primary px-8 py-4 rounded-2xl font-bold' }, 'Réalisations'),
                    h('button', { onClick: onContact, className: 'glass px-8 py-4 rounded-2xl font-bold hover:bg-white/5' }, 'Lancer un projet')
                )
            ),
            h('div', { className: 'hidden lg:grid grid-cols-2 gap-4' },
                [ {i:'layout', t:'Premium UI'}, {i:'zap', t:'Vitesse Flash'}, {i:'bot', t:'IA Intégrée'}, {i:'shield', t:'Sécurité Max'} ].map((x,i) => 
                    h('div', { key:i, className: `${STYLES.card} ${i%2!==0?'mt-8':''}` }, h(Icon, { name:x.i, className:'text-indigo-500 mb-4' }), h('h3', { className:'font-bold' }, x.t))
                )
            )
        );

        const Services = () => h(motion.div, { className: 'max-w-6xl mx-auto' },
            h('h2', { className: STYLES.title }, 'Nos Services'),
            h('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6' },
                ['Sites Vitrines', 'E-commerce', 'Landing Pages', 'Référencement SEO', 'Design UI/UX', 'Maintenance', 'IA Solutions', 'Web Apps'].map(s => 
                    h('div', { key: s, className: STYLES.card + " text-center group" },
                        h('div', { className: 'w-12 h-12 bg-indigo-500/10 rounded-xl flex items-center justify-center mx-auto mb-4 group-hover:bg-indigo-500 transition-colors' }, h(Icon, { name: 'check' })),
                        h('h3', { className: 'font-bold' }, s)
                    )
                )
            )
        );

        const Portfolio = () => h(motion.div, { className: 'max-w-5xl mx-auto' },
            h('h2', { className: STYLES.title }, 'Portfolio'),
            h('div', { className: 'grid md:grid-cols-2 gap-8' },
                [
                    { t: 'Luxe Gastronomie', d: 'Restaurant haut de gamme & Réservation WhatsApp.' },
                    { t: 'Nova School Portal', d: 'Gestion scolaire moderne pour universités.' }
                ].map(p => 
                    h('div', { key: p.t, className: STYLES.card + " border-l-4 border-indigo-600" },
                        h('h3', { className: 'text-2xl font-black mb-2' }, p.t),
                        h('p', { className: 'text-gray-400 mb-6 text-sm' }, p.d),
                        h('a', { href: '#', className: 'text-[10px] font-bold text-indigo-400 uppercase tracking-widest' }, 'Visiter le Projet')
                    )
                )
            )
        );

        const Quote = () => {
            const [sent, setSent] = useState(false);
            return h(motion.div, { className: 'max-w-2xl mx-auto' },
                h('h2', { className: 'text-4xl font-black text-center mb-8 uppercase' }, 'Devis Express'),
                sent ? h('div', { className: 'text-center py-12 glass rounded-3xl' }, h(Icon, { name: 'check-circle', className: 'text-green-500 mx-auto mb-4', size: 48 }), h('p', {}, 'Demande envoyée avec succès !')) :
                h('form', { className: 'glass p-8 rounded-3xl space-y-4', onSubmit: (e) => { e.preventDefault(); setSent(true); } },
                    h('div', { className: 'grid grid-cols-2 gap-4' },
                        h('input', { required: true, className: 'input-field p-4 w-full', placeholder: 'Nom' }),
                        h('input', { required: true, type: 'email', className: 'input-field p-4 w-full', placeholder: 'Email' })
                    ),
                    h('select', { className: 'input-field p-4 w-full text-gray-400' },
                        h('option', {}, 'Budget Estimé'), h('option', {}, '50$ - 100$'), h('option', {}, '100$ - 250$')
                    ),
                    h('textarea', { required: true, className: 'input-field p-4 w-full h-32', placeholder: 'Décrivez votre vision...' }),
                    h('button', { className: 'btn-primary w-full py-4 rounded-xl font-bold text-white' }, 'ENVOYER')
                )
            );
        };

        const Testimonials = ({ list, onAdd }) => {
            const [form, setForm] = useState(false);
            return h(motion.div, { className: 'max-w-6xl mx-auto' },
                h('h2', { className: STYLES.title }, 'Témoignages'),
                h('div', { className: 'grid md:grid-cols-3 gap-6' },
                    list.map((t, i) => h('div', { key: i, className: STYLES.card },
                        h('div', { className: 'flex items-center gap-3 mb-4' },
                            h('img', { src: t.photo, className: 'w-10 h-10 rounded-full bg-indigo-500/20' }),
                            h('div', {}, h('h4', { className: 'font-bold text-sm' }, t.name), h('p', { className: 'text-[9px] text-indigo-400 uppercase font-bold' }, t.company))
                        ),
                        h('p', { className: 'text-xs text-gray-400 italic leading-relaxed' }, `"${t.quote}"`)
                    ))
                ),
                h('div', { className: 'mt-12 max-w-md mx-auto' },
                    h('button', { onClick: () => setForm(!form), className: 'w-full text-[10px] font-bold text-indigo-400 border border-indigo-500/20 py-3 rounded-xl uppercase tracking-widest' }, form ? 'Annuler' : '+ Ajouter un avis'),
                    form && h('form', { className: 'mt-4 glass p-6 rounded-2xl space-y-3', onSubmit: (e) => { e.preventDefault(); onAdd({name:'Utilisateur', company:'Client', quote:e.target[2].value, photo:'https://api.dicebear.com/7.x/avataaars/svg?seed=new'}); setForm(false); } },
                        h('input', { placeholder: 'Nom', className: 'input-field p-3 w-full text-xs' }),
                        h('textarea', { placeholder: 'Votre expérience...', className: 'input-field p-3 w-full text-xs h-20' }),
                        h('button', { className: 'btn-primary w-full py-2 rounded-lg text-[10px] font-bold text-white' }, 'PUBLIER')
                    )
                )
            );
        };

        const About = () => h(motion.div, { className: 'max-w-3xl mx-auto space-y-8 pt-10' },
            h('h2', { className: STYLES.title }, 'À Propos'),
            h('div', { className: 'glass p-8 rounded-[32px] border-l-4 border-indigo-600' }, 
                h('p', { className: 'text-lg text-gray-300 leading-relaxed' }, 'Flori Web Studio apporte les technologies de pointe (IA, Design Headless) aux entrepreneurs exigeants. Nous fusionnons créativité artistique et rigueur technique.')
            ),
            h('div', { className: 'grid grid-cols-3 gap-4 text-center' },
                [ {t:'100%', l:'Satisfaction'}, {t:'24h', l:'Réponse'}, {t:'2x', l:'Vitesse'} ].map((s,i) => 
                    h('div', { key:i, className:'glass p-4 rounded-2xl' }, h('div', { className:'text-xl font-black text-indigo-500' }, s.t), h('div', { className:'text-[9px] text-gray-500 uppercase font-bold' }, s.l))
                )
            )
        );

        const ChatBot = ({ isOpen, setIsOpen }) => {
            const [msgs, setMsgs] = useState([{ b: true, t: 'Besoin d\'un site moderne ? Je peux vous aider !' }]);
            const [val, setVal] = useState('');

            const send = () => {
                if(!val.trim()) return;
                setMsgs([...msgs, { b: false, t: val }]); setVal('');
                setTimeout(() => setMsgs(prev => [...prev, { b: true, t: 'Un membre de Flori Studio va vous répondre sur WhatsApp pour une étude précise.' }]), 600);
            };

            return h('div', { className: 'fixed bottom-6 right-6 z-[100] flex flex-col items-end' },
                h(AnimatePresence, {}, isOpen && h(motion.div, { initial: { opacity: 0, scale: 0.9, y: 20 }, animate: { opacity: 1, scale: 1, y: 0 }, exit: { opacity: 0, scale: 0.9, y: 20 }, className: 'w-[320px] h-[400px] glass rounded-[24px] mb-4 overflow-hidden flex flex-col shadow-2xl border-indigo-500/20' },
                    h('div', { className: 'p-4 bg-indigo-600 text-white font-bold flex justify-between' }, 'AI Assistant', h('span', { onClick: () => setIsOpen(false), className: 'cursor-pointer' }, '✕')),
                    h('div', { className: 'flex-grow p-4 overflow-y-auto space-y-3' },
                        msgs.map((m, i) => h('div', { key: i, className: `flex ${m.b ? 'justify-start' : 'justify-end'}` },
                            h('div', { className: `p-3 rounded-2xl text-[11px] max-w-[80%] ${m.b ? 'bg-white/10' : 'bg-indigo-600'}` }, m.t)
                        ))
                    ),
                    h('div', { className: 'p-3 flex gap-2 border-t border-white/5' },
                        h('input', { value: val, onChange: (e) => setVal(e.target.value), placeholder: 'Question...', className: 'flex-grow bg-white/5 p-2 rounded-lg text-xs outline-none' }),
                        h('button', { onClick: send, className: 'bg-indigo-600 p-2 rounded-lg' }, h(Icon, { name: 'send', size: 14 }))
                    )
                )),
                h('button', { onClick: () => setIsOpen(!isOpen), className: 'w-14 h-14 btn-primary rounded-full flex items-center justify-center text-white shadow-xl' }, h(Icon, { name: isOpen ? 'x' : 'message-circle' }))
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(App));
    </script>
</body>
</html>
